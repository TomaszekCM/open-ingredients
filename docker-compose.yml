services:
  db:
    image: postgres:16-alpine
    container_name: openingredients-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openingredients-api
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST}
      APP_PORT: ${APP_PORT}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
